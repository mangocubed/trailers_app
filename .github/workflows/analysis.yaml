name: Analysis

on:
    workflow_call:

env:
    CARGO_TERM_COLOR: always

jobs:
    check_app:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-flutter
            - name: Check with dart format
              run: dart format --set-exit-if-changed .
            - name: Check with flutter analyze
              run: flutter analyze
