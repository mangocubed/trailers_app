fragment TitleFragment on TitleObject {
    id
    mediaType
    name
    releasedOn
    runtime
    posterImageUrl
    crew(first: 1, jobs: [DIRECTOR]) {
        nodes {
            id
            person {
                id
                name
                createdAt
                updatedAt
            }
            createdAt
            updatedAt
        }
    }
    genres {
        nodes {
            id
            name
            createdAt
            updatedAt
        }
    }
    videos(first: 1) {
        nodes {
            ...VideoFragment
        }
    }
    stat {
        ...TitleStatFragment
    }
    currentUserTie {
        ...UserTitleTieFragment
    }
    createdAt
    updatedAt
}
