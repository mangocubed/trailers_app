query Titles(
    $after: UUID
    $first: Int
    $query: String
    $mediaType: TitleMediaType
    $genreIds: [UUID!]
    $watchProviderIds: [UUID!]
    $countryCode: String
    $includeViewed: Boolean
    $includeWithoutVideos: Boolean
) {
    titles(
        after: $after
        first: $first
        query: $query
        mediaType: $mediaType
        genreIds: $genreIds
        watchProviderIds: $watchProviderIds
        countryCode: $countryCode
        includeViewed: $includeViewed
        includeWithoutVideos: $includeWithoutVideos
    ) {
        nodes {
            ...TitleFragment
        }
        pageInfo {
            endCursor
        }
    }
}
