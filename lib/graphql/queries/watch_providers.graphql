query WatchProviders($after: UUID, $ids: [UUID!], $countryCode: String) {
    watchProviders(first: 50, after: $after, ids: $ids, countryCode: $countryCode) {
        nodes {
            id
            name
            logoImageUrl
            createdAt
            updatedAt
        }
        pageInfo {
            endCursor
            hasNextPage
        }
    }
}
