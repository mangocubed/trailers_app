query UserTitleTies($username: String!, $after: UUID, $first: Int, $isBookmarked: Boolean, $isWatched: Boolean) {
    user(username: $username) {
        ...UserFragment
        titleTies(after: $after, first: $first, isBookmarked: $isBookmarked, isWatched: $isWatched) {
            nodes {
                id
                title {
                    ...TitleFragment
                }
                createdAt
                updatedAt
            }
            pageInfo {
                endCursor
                startCursor
            }
        }
    }
}
