query Title($id: ID!, $countryCode: String) {
    title(id: $id) {
        ...TitleFragment
        overview
        cast(first: 50) {
            nodes {
                id
                person {
                    id
                    profileImageUrl
                    name
                    createdAt
                    updatedAt
                }
                createdAt
                updatedAt
            }
        }
        watchProviders(first: 50, countryCode: $countryCode) {
            nodes {
                id
                watchProvider {
                    id
                    name
                    logoImageUrl
                    createdAt
                    updatedAt
                }
                countryCodes
                createdAt
                updatedAt
            }
        }
    }
}
