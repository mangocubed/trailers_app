}

type GenreObjectConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [GenreObjectEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [GenreObject!]!
}

"""
An edge in a connection.
"""
type GenreObjectEdge {
	"""
	The item at the end of the edge
	"""
	node: GenreObject!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

